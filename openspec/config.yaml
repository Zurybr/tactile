# OpenSpec configuration for the tactile project.
# Artifact store mode: hybrid (Engram + OpenSpec).
# Engram project key: tactile
# Generated by sdd-init on 2026-07-09.

schema: spec-driven

project:
  name: tactile
  path: C:\Users\brand\OneDrive\Desktop\workspaces\trabajo-lefarma\eliminar\touchtiping
  repo: https://github.com/Zurybr/tactile
  license: MIT
  author: Brandom Ledesma

context: |
  Stack: Python >=3.12, uv (uv_build backend), Textual >=0.60 TUI.
  Architecture: src/tactile package - engine.py (typing engine),
    curriculum.py (lessons/units/levels), progress.py (JSON to ~/.tactile/),
    app.py + screens/ + widgets.py (Textual TUI), codeload.py (layouts),
    __main__.py (CLI). Wordlists in wordlists/, layouts in layouts/.
  Testing: pytest 9.1.1 + pytest-asyncio (asyncio_mode=auto), 76 tests green.
  Style: strict TDD (red-green-refactor), docs-sync, changelog-sync,
    Conventional Commits with feature scope.

persistence:
  mode: hybrid
  engram_project: tactile

testing:
  strict_tdd: true
  test_command: uv run pytest -q
  test_layers:
    unit: pytest
    integration: pytest (test_practice_flow, test_app)
    e2e: none
  coverage:
    available: false
    command: ""
  quality:
    linter: none
    type_checker: none
    formatter: none
  docs_validation: uv run python scripts/validate_docs.py

rules:
  proposal:
    - Include rollback plan for risky changes
    - Scope each proposal to one feature area (engine|curriculum|progress|tui|layouts|cli)
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Document architecture decisions with rationale
    - Preserve src/tactile module boundaries (engine/curriculum/progress/tui/codeload)
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
    - Every behavior change needs a test (red-green-refactor)
  apply:
    - Follow existing code patterns in src/tactile/
    - Update the matching doc per AGENTS.md module-to-doc mapping for every code change
    - Add a CHANGELOG.md entry under [Unreleased] for every behavior change
    - Use Conventional Commits: <type>(<scope>): <subject>
    tdd: true
    test_command: uv run pytest -q
  verify:
    test_command: uv run pytest -q
    build_command: uv run python scripts/validate_docs.py
    coverage_threshold: 0
    pre_push_checklist:
      - uv run pytest -q is green
      - Docs updated for every touched module
      - CHANGELOG.md has an [Unreleased] entry for behavior changes
      - uv run python scripts/validate_docs.py passes
      - Commit message follows <type>(<scope>): <subject>
  archive:
    - Warn before merging destructive deltas
    - Move change folder to openspec/changes/archive/YYYY-MM-DD-{change-name}/
